[defaults]
inventory = inventory/azure_rm.yml
remote_user = drupaladmin
private_key_file = ~/.ssh/drupal_key
host_key_checking = False
stdout_callback = default
deprecation_warnings = False
roles_path = /home/osboxes/Desktop/PROJECTS/Drupal-infrastructure/ansible/roles

[privilege_escalation]
become = True
become_method = sudo
become_user = root